
name: keg-build
on:
  push:
    branches:
      - develop

jobs:
  tests:
    name: 'Build Repos'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: "Setup node Version"
        uses: actions/setup-node@v2
        with:
          node-version: "14"

      - name: "Get Changed Files"
        id: get-changed-files
        run: bash scripts/ci/getChangedFiles.sh

      - name: "Get Changed Repos"
        id: get-changed-repos
        run: bash scripts/ci/getChangedRepos.sh

      - name: "Install - Cache Dependencies"
        uses: bahmutov/npm-install@v1
        with:
          install-command: yarn install --ignore-engines --frozen-lockfile --silent --force
          working-directory: |
            repos/jsutils
            repos/keg-components
            repos/keg-core
            repos/re-theme
            repos/tap-resolver

      - name: "Run Repo Format"
        id: run-repo-format
        run: bash scripts/ci/runYarnCmd.sh "format"

      - name: "Run Repo Build"
        id: run-repo-build
        run: bash scripts/ci/buildChangedRepos.sh

      - name: "Run Repo Tests"
        id: run-repo-tests
        run: bash scripts/ci/runYarnCmd.sh "test"

      - name: "Commit Repo Changes"
        id: commit-changes
        run: bash scripts/ci/commitChanges.sh "Repo-Build"
